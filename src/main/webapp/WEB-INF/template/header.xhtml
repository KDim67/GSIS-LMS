<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui">

    <!-- Top Branding Row -->
    <div class="header-top">
        <div class="header-brand">
            <h:graphicImage name="images/gsis_logo.png" alt="GSIS Logo" styleClass="logo-image" />
            <div class="header-titles">
                <h2>Σύστημα Διαχείρισης Αδειών</h2>
            </div>
        </div>
        <div class="header-right">
            <span class="header-badge">
                <i class="pi pi-user" style="margin-right:5px;"></i>
                #{sessionController.currentUser.firstName} #{sessionController.currentUser.lastName}
            </span>
            <p:commandButton value="Αποσύνδεση" icon="pi pi-sign-out"
                             action="#{sessionController.logout}"
                             styleClass="btn-export"
                             style="margin:0;" />
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="layout-navbar">
        <div class="nav-container">
            <p:link outcome="/manager/stats.xhtml"
                    styleClass="nav-item #{request.servletPath.contains('stats') ? 'active' : ''}">
                <i class="pi pi-chart-bar"></i>
                <span>Dashboard</span>
            </p:link>
            <p:link outcome="/manager/requests.xhtml"
                    styleClass="nav-item #{request.servletPath.contains('requests') ? 'active' : ''}">
                <i class="pi pi-list"></i>
                <span>Αιτήματα Άδειας</span>
            </p:link>
            <p:link outcome="/manager/audit.xhtml"
                    styleClass="nav-item #{request.servletPath.contains('audit') ? 'active' : ''}">
                <i class="pi pi-history"></i>
                <span>Αρχείο Ελέγχου</span>
            </p:link>
        </div>
    </div>

</ui:composition>
