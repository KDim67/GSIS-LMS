<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template/layout.xhtml">

    <ui:define name="content">
        <h:form id="auditForm">

            <!-- Page Header -->
            <div class="page-header">
                <h2>
                    <i class="pi pi-history"></i>
                    Αρχείο Ελέγχου Συστήματος
                </h2>

                <div class="toolbar-right">
                    <p:commandButton value="Εξαγωγή Excel"
                                     icon="pi pi-download"
                                     styleClass="btn-export"
                                     action="#{auditController.exportHtmlExcel}"
                                     ajax="false" />
                </div>
            </div>

            <p:dataTable id="auditTable"
                         value="#{auditController.auditLogs}"
                         var="log"
                         paginator="true"
                         rows="15"
                         paginatorPosition="bottom"
                         paginatorTemplate="{FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                         rowsPerPageTemplate="15,30,50"
                         sortField="timestamp"
                         sortOrder="DESCENDING"
                         emptyMessage="Δεν βρέθηκαν καταγραφές ελέγχου.">

                <p:column headerText="ΗΜΕΡΟΜΗΝΙΑ &amp; ΩΡΑ"
                          sortBy="#{log.timestamp}"
                          exportValue="#{auditController.exportTimestamp(log)}"
                          style="width:170px;">
                    <span style="display:flex; align-items:center; gap:6px; color:var(--text-sub); font-size:0.875rem;">
                        <i class="pi pi-calendar" style="color:var(--blue);"></i>
                        <h:outputText value="#{log.timestamp}">
                            <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm:ss" />
                        </h:outputText>
                    </span>
                </p:column>

                <p:column headerText="ΧΡΗΣΤΗΣ"
                          filterBy="#{log.user.fullName}"
                          filterMatchMode="contains"
                          filterPlaceholder="Αναζήτηση..."
                          exportValue="#{auditController.exportUser(log)}">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="width:30px; height:30px; border-radius:50%;
                                     background:var(--blue-light); color:var(--blue);
                                     display:inline-flex; align-items:center; justify-content:center;
                                     font-weight:700; font-size:0.8rem; flex-shrink:0;">
                            #{log.user.firstName.substring(0,1)}#{log.user.lastName.substring(0,1)}
                        </span>
                        <div>
                            <div class="fw-bold" style="font-size:0.875rem;">
                                #{log.user.firstName} #{log.user.lastName}
                            </div>
                            <div class="text-muted" style="font-size:0.78rem;">
                                #{log.user.email}
                            </div>
                        </div>
                    </div>
                </p:column>

                <p:column headerText="ΕΝΕΡΓΕΙΑ"
                          filterBy="#{log.action}"
                          filterMatchMode="contains"
                          filterPlaceholder="Φιλτράρισμα..."
                          exportValue="#{auditController.exportAction(log)}"
                          style="width:160px;">
                    <h:panelGroup>
                        <span class="badge #{log.action == 'APPROVE' ? 'badge-approved' : log.action == 'REJECT' ? 'badge-rejected' : 'badge-pending'}"
                              style="text-transform:none;">
                            <i class="pi #{log.action == 'APPROVE' ? 'pi-check' : log.action == 'REJECT' ? 'pi-times' : 'pi-pencil'}"></i>
                            #{log.action}
                        </span>
                    </h:panelGroup>
                </p:column>

                <p:column headerText="ΑΝΑΓΝΩΡΙΣΤΙΚΟ"
                          exportValue="#{auditController.exportTargetId(log)}"
                          style="width:150px;">
                    <span style="font-family: monospace; color:var(--blue); font-weight:600;
                                 background:var(--blue-light); padding:2px 8px;
                                 border-radius:4px; font-size:0.85rem;">
                        REQ-#{log.targetId}
                    </span>
                </p:column>

                <p:column headerText="ΣΧΟΛΙΟ"
                          exportValue="#{auditController.exportComment(log)}">
                    <h:outputText value="#{log.comment}"
                                  style="color:var(--text-sub); font-size:0.875rem;" />
                </p:column>

            </p:dataTable>

        </h:form>
    </ui:define>

</ui:composition>
