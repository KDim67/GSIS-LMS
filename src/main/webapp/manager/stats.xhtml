<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template/layout.xhtml">

    <ui:define name="content">

        <div class="page-header">
            <h2>
                <i class="pi pi-chart-bar"></i>
                Στατιστικά Τμήματος
            </h2>
            <span class="text-muted" style="font-size:0.85rem;">
                <i class="pi pi-calendar" style="margin-right:5px;"></i>
                Τελευταία ενημέρωση: 
                <h:outputText value="#{dashboardController.lastUpdated}">
                    <f:convertDateTime type="localDateTime" pattern="dd/MM/yyyy HH:mm" />
                </h:outputText>
            </span>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="pi pi-inbox"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-value">#{dashboardController.totalRequests}</div>
                    <div class="stat-label">ΣΥΝΟΛΟ ΑΙΤΗΜΑΤΩΝ</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="pi pi-clock"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-value">#{dashboardController.pendingCount}</div>
                    <div class="stat-label">ΕΚΚΡΕΜΗ</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="pi pi-check-circle"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-value">#{dashboardController.approvedCount}</div>
                    <div class="stat-label">ΕΓΚΕΚΡΙΜΕΝΑ</div>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon red">
                    <i class="pi pi-times-circle"></i>
                </div>
                <div class="stat-info">
                    <div class="stat-value">#{dashboardController.rejectedCount}</div>
                    <div class="stat-label">ΑΠΟΡΡΙΦΘΕΝΤΑ</div>
                </div>
            </div>
        </div>

        <h:form id="dashboardChartsForm">
            <div class="chart-container">

                <div class="chart-box">
                    <div class="chart-box-header">
                        <h3><i class="pi pi-chart-pie" style="margin-right:6px;"></i>Κατανομή Κατάστασης</h3>
                    </div>
                    <div class="chart-box-body">
                        <p:pieChart model="#{dashboardController.pieModel}"
                                    style="width:100%; height:360px;" />
                    </div>
                </div>

                <div class="chart-box">
                    <div class="chart-box-header">
                        <h3><i class="pi pi-chart-bar" style="margin-right:6px;"></i>Αιτήματα ανά Τύπο Άδειας</h3>
                    </div>
                    <div class="chart-box-body">
                        <p:barChart model="#{dashboardController.barModel}"
                                    style="width:100%; height:360px;" />
                    </div>
                </div>

            </div>
        </h:form>

    </ui:define>

</ui:composition>
