<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Σύνδεση - Leave Management System</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <h:outputStylesheet library="css"
                        name="style.css"/>
</h:head>

<h:body>

    <ui:include src="/WEB-INF/template/header.xhtml"/>

    <div class="container">

        <div class="page-header">
            <h2>
                <i class="pi pi-lock"></i>
                Σύνδεση Χρήστη
            </h2>
        </div>

        <div class="card"
             style="max-width: 480px; margin: 0 auto;">

            <div class="card-header">
                <h3>
                    <i class="pi pi-id-card"></i>
                    Είσοδος στο σύστημα
                </h3>
            </div>

            <div class="card-body">

                <h:form id="loginForm">

                    <p:growl id="messages"
                             showDetail="true"
                             life="4000"/>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="email"
                                       value="Email"/>

                        <p:inputText id="email"
                                     value="#{loginController.email}"
                                     required="true"
                                     requiredMessage="Το email είναι υποχρεωτικό."
                                     style="width:100%"/>

                    </div>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="password"
                                       value="Κωδικός"/>

                        <p:password id="password"
                                    value="#{loginController.password}"
                                    required="true"
                                    requiredMessage="Ο κωδικός είναι υποχρεωτικός."
                                    feedback="false"
                                    style="width:100%"/>

                    </div>

                    <p:commandButton value="Σύνδεση"
                                     action="#{loginController.login}"
                                     update="@form"
                                     icon="pi pi-sign-in"
                                     styleClass="btn-primary"
                                     style="width:100%"/>

                </h:form>

                <div class="section-divider"></div>

                <p class="text-muted mb-0"
                   style="text-align:center;">

                    Δεν έχετε λογαριασμό;

                    <h:outputLink value="#{request.contextPath}/register.xhtml"
                                  styleClass="text-orange fw-bold">
                        Κάντε εγγραφή
                    </h:outputLink>

                </p>

            </div>

        </div>

    </div>

</h:body>
</html>
