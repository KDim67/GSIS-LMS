<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Register - Leave Management System</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .top-bar {
            background-color: #0188ca;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .auth-container {
            width: 420px;
            margin: 60px auto;
        }

        .auth-menu {
            margin-bottom: 20px;
            text-align: center;
        }

        .auth-link {
            margin: 0 10px;
            color: #0188ca;
            font-weight: bold;
            text-decoration: none;
        }

        .auth-link:hover {
            color: #ed5929;
        }

        .ui-panel-titlebar {
            background: #0188ca !important;
            color: white !important;
            border: none !important;
        }

        .ui-button {
            background: #ed5929 !important;
            border: none !important;
        }

        .ui-button:hover {
            background: #d94f22 !important;
        }

    </style>

</h:head>

<h:body>

    <div class="top-bar">
        Γενική Γραμματεία Πληροφοριακών Συστημάτων
    </div>

    <div class="auth-container">

        <div class="auth-menu">

            <h:link outcome="/login.xhtml"
                    value="Login"
                    styleClass="auth-link"/>

            <h:link outcome="/register.xhtml"
                    value="Register"
                    styleClass="auth-link"/>

        </div>

        <h:form id="registerForm">

            <p:growl id="messages"
                     showDetail="true"
                     life="4000"/>

            <p:panel header="Εγγραφή Υπαλλήλου">

                <p:outputLabel for="firstName"
                               value="Όνομα"/>

                <p:inputText id="firstName"
                             value="#{loginController.firstName}"
                             required="true"
                             requiredMessage="Το όνομα είναι υποχρεωτικό."
                             style="width:100%"/>

                <br/><br/>

                <p:outputLabel for="lastName"
                               value="Επώνυμο"/>

                <p:inputText id="lastName"
                             value="#{loginController.lastName}"
                             required="true"
                             requiredMessage="Το επώνυμο είναι υποχρεωτικό."
                             style="width:100%"/>

                <br/><br/>

                <p:outputLabel for="registerEmail"
                               value="Email"/>

                <p:inputText id="registerEmail"
                             value="#{loginController.registerEmail}"
                             required="true"
                             requiredMessage="Το email είναι υποχρεωτικό."
                             style="width:100%"/>

                <br/><br/>

                <p:outputLabel for="registerPassword"
                               value="Κωδικός"/>

                <p:password id="registerPassword"
                            value="#{loginController.registerPassword}"
                            required="true"
                            requiredMessage="Ο κωδικός είναι υποχρεωτικός."
                            feedback="true"
                            style="width:100%"/>

                <br/><br/>

                <p:commandButton value="Εγγραφή"
                                 action="#{loginController.register}"
                                 update="@form"
                                 icon="pi pi-user-plus"
                                 style="width:100%"/>

            </p:panel>

        </h:form>

    </div>

</h:body>
</html>
