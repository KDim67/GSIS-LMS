<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

<h:head>
    <title>Εγγραφή - Leave Management System</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0"/>

    <h:outputStylesheet library="css"
                        name="style.css"/>
</h:head>

<h:body>

    <ui:include src="/WEB-INF/template/header.xhtml"/>

    <div class="container">

        <div class="page-header">
            <h2>
                <i class="pi pi-user-plus"></i>
                Εγγραφή Υπαλλήλου
            </h2>
        </div>

        <div class="card"
             style="max-width: 520px; margin: 0 auto;">

            <div class="card-header">
                <h3>
                    <i class="pi pi-user-edit"></i>
                    Δημιουργία νέου λογαριασμού
                </h3>
            </div>

            <div class="card-body">

                <h:form id="registerForm">

                    <p:growl id="messages"
                             showDetail="true"
                             life="4000"/>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="firstName"
                                       value="Όνομα"/>

                        <p:inputText id="firstName"
                                     value="#{loginController.firstName}"
                                     required="true"
                                     requiredMessage="Το όνομα είναι υποχρεωτικό."
                                     style="width:100%"/>

                    </div>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="lastName"
                                       value="Επώνυμο"/>

                        <p:inputText id="lastName"
                                     value="#{loginController.lastName}"
                                     required="true"
                                     requiredMessage="Το επώνυμο είναι υποχρεωτικό."
                                     style="width:100%"/>

                    </div>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="registerEmail"
                                       value="Email"/>

                        <p:inputText id="registerEmail"
                                     value="#{loginController.registerEmail}"
                                     required="true"
                                     requiredMessage="Το email είναι υποχρεωτικό."
                                     style="width:100%"/>

                    </div>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="registerPassword"
                                       value="Κωδικός"/>

                        <p:password id="registerPassword"
                                    value="#{loginController.registerPassword}"
                                    required="true"
                                    requiredMessage="Ο κωδικός είναι υποχρεωτικός."
                                    feedback="true"
                                    style="width:100%"/>

                        <small class="text-muted">

                            Ο κωδικός πρέπει να περιέχει τουλάχιστον
                            8 χαρακτήρες,
                            ένα κεφαλαίο γράμμα,
                            ένα πεζό γράμμα
                            και έναν αριθμό.

                        </small>

                    </div>

                    <div class="dialog-comment-wrap">

                        <p:outputLabel for="confirmPassword"
                                       value="Επιβεβαίωση Κωδικού"/>

                        <p:password id="confirmPassword"
                                    value="#{loginController.confirmPassword}"
                                    required="true"
                                    requiredMessage="Η επιβεβαίωση κωδικού είναι υποχρεωτική."
                                    feedback="false"
                                    style="width:100%"/>

                    </div>

                    <p:commandButton value="Εγγραφή"
                                     action="#{loginController.register}"
                                     update="@form"
                                     icon="pi pi-user-plus"
                                     style="width:100%"/>

                </h:form>

                <div class="section-divider"></div>

                <p class="text-muted mb-0"
                   style="text-align:center;">

                    Έχετε ήδη λογαριασμό;

                    <h:outputLink value="#{request.contextPath}/login.xhtml"
                                  styleClass="text-orange fw-bold">
                        Κάντε σύνδεση
                    </h:outputLink>

                </p>

            </div>

        </div>

    </div>

</h:body>
</html>
